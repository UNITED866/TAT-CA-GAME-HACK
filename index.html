    <style>
        :root {
            --primary: #2d6a61;
            --bg: #f5f7fa;
            --white: #ffffff;
            --tele-color: #2481cc;
            --dark-auth: #0a0a0a;
            --success: #00ff88;
            --accent: #e6f2f0;
        }

        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; height: 100%; width: 100%; overflow: hidden; background-color: var(--bg); }

        /* --- TOAST NOTIFICATION --- */
        #toast { position: fixed; top: 20px; right: -300px; background: var(--white); border-left: 5px solid var(--primary); padding: 15px 25px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 10px; z-index: 100000; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #toast.show { right: 20px; }

        /* --- LÌ XÌ RƠI --- */
        #lixiBox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 99999; overflow: hidden; }
        .lixi { position: absolute; top: -50px; width: 16px; height: 26px; background-color: #d40000; border: 1px solid #ffd700; border-radius: 4px; display: flex; justify-content: center; align-items: center; color: #ffd700; font-weight: bold; font-size: 9px; animation: fall linear forwards; }
        .lixi::after { content: '福'; } 
        @keyframes fall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0.2; } }

        /* --- AUTH SCREEN --- */
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--dark-auth); display: flex; justify-content: center; align-items: center; z-index: 10000; transition: opacity 0.5s ease; }
        .auth-card { background: #121212; border-radius: 30px; padding: 40px 20px; width: 85%; max-width: 350px; text-align: center; border: 1px solid #333; }
        .circle-loader { width: 50px; height: 50px; border: 4px solid #1a1a1a; border-top: 4px solid var(--success); border-radius: 50%; margin: 0 auto 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- MAIN CONTENT --- */
        #main-content { display: none; height: 100vh; overflow-y: auto; flex-direction: column; align-items: center; padding: 20px; position: relative; z-index: 10; }
        .container { width: 100%; max-width: 450px; }
        .card { background: var(--white); border-radius: 25px; padding: 22px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center; border: 1px solid rgba(0,0,0,0.02); }
        
        .section-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; color: #333; }
        .clock-container { background: var(--accent); color: var(--primary); padding: 6px 12px; border-radius: 10px; font-weight: bold; font-size: 13px; margin-bottom: 15px; display: inline-block; }

        .tag { background: #f8f9fa; border: 1px solid #eee; padding: 8px 12px; border-radius: 15px; display: inline-block; margin: 4px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.3s; }
        .tag.active { background-color: var(--primary); color: white; border-color: var(--primary); }

        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 14px; border-radius: 20px; text-decoration: none; font-weight: bold; font-size: 15px; border: none; cursor: pointer; transition: 0.3s; box-sizing: border-box; }
        .btn-main { background: var(--primary); color: white; }
        .btn-outline { background: white; color: var(--primary); border: 2px solid var(--primary); }

        /* --- KHUNG TẢI GAME --- */
        .download-grid { display: grid; grid-template-columns: 1fr; gap: 10px; text-align: left; }
        .dl-item { background: #f9f9f9; padding: 12px 15px; border-radius: 15px; display: flex; align-items: center; justify-content: space-between; text-decoration: none; color: #444; border: 1px solid #eee; transition: 0.3s; }
        .dl-item:hover { background: var(--accent); border-color: var(--primary); transform: translateX(5px); }
        .dl-info { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 600; }
        .dl-info i.game-icon { color: var(--primary); font-size: 16px; }
        
        /* Badge mới với icon download thay dấu ngoặc */
        .dl-badge { font-size: 10px; background: #eee; padding: 3px 8px; border-radius: 6px; color: #555; display: flex; align-items: center; gap: 4px; border: 1px solid #ddd; }
        .dl-badge i { font-size: 9px; color: var(--primary); }

        .tele-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .tele-box { background: #eef7ff; border: 1px solid #cce5ff; padding: 12px; border-radius: 15px; text-align: center; text-decoration: none; color: var(--tele-color); font-size: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px; }
    </style>
</head>

    <script>
        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function updateTime() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0') + ":" + now.getSeconds().toString().padStart(2,'0') + " - " + now.getDate().toString().padStart(2,'0') + "/" + (now.getMonth()+1).toString().padStart(2,'0') + "/" + now.getFullYear();
            document.getElementById('realTime').innerHTML = `<i class="fas fa-clock"></i> ${timeStr}`;
        }
        setInterval(updateTime, 1000);

        function createLixi() {
            const c = document.getElementById('lixiBox');
            const l = document.createElement('div');
            l.className = 'lixi';
            l.style.left = Math.random() * 98 + "vw";
            l.style.animationDuration = (Math.random() * 3 + 4) + "s";
            c.appendChild(l);
            setTimeout(() => l.remove(), 6000);
        }
        setInterval(createLixi, 500);

        const audio = document.getElementById("bgMusic");
        function enterMain() {
            document.getElementById('auth-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                audio.play().catch(() => {});

        }

        let currentSelected = "";
        const gameLinks = { "FC MOBILE": "https://vuotnhanh.com/Y6K4", "LIÊN QUÂN": "https://vuotnhanh.com/eurg", "LIÊN QUÂN IOS": "https://link4m.com/0QdlYwL4", "8 BALL POOL": "https://link4m.com/go/ZK8vJff" };

        function selectGame(el, name) {
            document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            currentSelected = name;
            showToast("Đã chọn " + name);
        }

        function redirectToTask() {
            if (!currentSelected) { showToast("Vui lòng chọn Game!"); return; }
            window.location.href = gameLinks[currentSelected];
        }
